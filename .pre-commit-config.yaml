repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
    -   id: ruff-check
        args: [--fix]
        types_or: [python, pyi]
    -   id: ruff-format
        types_or: [python, pyi]

-   repo: local
    hooks:
    -   id: frontend-lint-staged
        name: Run frontend lint-staged
        entry: bash -c "cd frontend && npx run lint-staged --no-stash --quiet"
        language: system
        pass_filenames: false
